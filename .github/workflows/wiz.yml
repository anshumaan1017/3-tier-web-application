name: Wiz Security Scan (IaC + SCA + Container)

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  wiz-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    env:
      TAG: 3-tier-web-application:${{ github.sha }}
      POLICY: "Default vulnerabilities policy"
      APPSEC_CONTACT: ${{ vars.APPSEC_CONTACT }}
      GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      COLUMNS: "250"
      TERM: xterm-256color

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install wizcli
        run: |
          curl -fsSL -o wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          chmod +x wizcli
          sudo mv wizcli /usr/local/bin/wizcli
          wizcli version

      - name: Authenticate Wiz CLI
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: wizcli auth --id "$WIZ_CLIENT_ID" --secret "$WIZ_CLIENT_SECRET"

      # ── SCA: source-code dependency scan ─────────────────────────────────
      - name: Wiz SCA Scan (source dependencies)
        continue-on-error: true
        run: |
          echo "::group::Wiz SCA Scan"
          wizcli dir scan --path . \
            --output dir.sarif,sarif,vulnerabilities \
            --output dir.txt,human,vulnerabilities
          echo "::endgroup::"
          echo "::group::SCA findings (raw)"
          cat dir.txt 2>/dev/null || echo "(no text output)"
          echo "::endgroup::"

      # ── IaC: Dockerfile misconfiguration scan ────────────────────────────
      - name: Wiz IaC Scan (Dockerfile)
        continue-on-error: true
        run: |
          echo "::group::Wiz IaC Scan"
          wizcli iac scan --path ./Dockerfile \
            --output dockerfile.sarif,sarif,misconfigurations \
            --output dockerfile.txt,human,misconfigurations
          echo "::endgroup::"
          echo "::group::IaC findings (raw)"
          cat dockerfile.txt 2>/dev/null || echo "(no text output)"
          echo "::endgroup::"

      # ── Build image ───────────────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build . -t "$TAG"
          echo "Built: $TAG"

      # ── Container scan (per-layer via overlay2 driver) ────────────────────
      - name: Wiz Container Image Scan (per-layer)
        id: wiz_scan
        continue-on-error: true
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          echo "::group::Re-auth as root (required for overlay2 driver)"
          sudo -E $(which wizcli) auth --id "$WIZ_CLIENT_ID" --secret "$WIZ_CLIENT_SECRET"
          echo "::endgroup::"
          echo "::group::Wiz Container Image Scan"
          echo "Image: $TAG  |  Policy: $POLICY"
          sudo -E $(which wizcli) docker scan \
            --image "$TAG" \
            --policies "$POLICY" \
            --driver mountWithLayers \
            --output image.sarif,sarif,vulnerabilities \
            --output image.txt,human,vulnerabilities \
            --output image-layers.json,json,vulnerabilities
          echo "::endgroup::"
          sudo chown runner:runner image.sarif image.txt image-layers.json 2>/dev/null || true
          echo "::group::Image findings (raw)"
          cat image.txt 2>/dev/null || echo "(no text output)"
          echo "::endgroup::"
          echo "Output files:"; ls -lh image.sarif image.txt image-layers.json 2>/dev/null || true

      # ── Enrich SARIFs + print tabular reports ────────────────────────────
      - name: Enrich SARIFs and print reports
        if: always()
        shell: pwsh
        run: |
          ./scripts/parse_wiz_scan.ps1 `
            -ImageSarifPath      image.sarif `
            -ImageLayersPath     image-layers.json `
            -DirSarifPath        dir.sarif `
            -DockerfileSarifPath dockerfile.sarif `
            -SummaryMarkdownPath wiz-summary.md `
            -GitHubRunUrl        "${{ env.GITHUB_RUN_URL }}" `
            -AppSecContact       "${{ env.APPSEC_CONTACT }}"

      - name: Publish summary to GitHub Job Summary
        if: always()
        run: cat wiz-summary.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wiz-scans-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            wiz-summary.md
            image.sarif
            dir.sarif
            dockerfile.sarif
            image.txt
            image-layers.json
            dir.txt
            dockerfile.txt

      # ── Upload each SARIF with its own category (prevents merging) ────────
      - name: Upload SCA SARIF
        if: always() && hashFiles('dir.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: dir.sarif
          category: wiz-sca
          wait-for-processing: true

      - name: Upload IaC SARIF
        if: always() && hashFiles('dockerfile.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: dockerfile.sarif
          category: wiz-iac
          wait-for-processing: true

      - name: Upload Image SARIF
        if: always() && hashFiles('image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: image.sarif
          category: wiz-image
          wait-for-processing: true

      # ── Policy gate ───────────────────────────────────────────────────────
      - name: Enforce Wiz policy gate
        if: always()
        run: |
          outcome="${{ steps.wiz_scan.outcome }}"
          echo "Wiz container scan outcome: $outcome"
          if [ "$outcome" = "failure" ]; then
            echo "::error::Wiz scan step failed (check credentials / network, not a policy violation)"
            exit 1
          fi
          echo "Policy violations (exit code 4) are visible in the GitHub Security tab."
