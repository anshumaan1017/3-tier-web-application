name: wiz-cli

on:
  push:

jobs:
  wiz-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
      actions: read
      security-events: write 

    env:
      TAG: docker-tag
      POLICY: "Default vulnerabilities policy"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install jq
        uses: dcarbone/install-jq-action@v3.2.0

      - name: Build image
        run: docker build . -t $TAG

      - name: Install wizcli
        run: |
          curl -L -o wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          chmod +x wizcli

      - name: Wiz help
        run: |
          ./wizcli --help
          ./wizcli scan container-image --help

      - name: Run Wiz Container Scan
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          ./wizcli scan container-image $TAG \
          --policies "$POLICY" \
          --client-id $WIZ_CLIENT_ID \
          --client-secret $WIZ_CLIENT_SECRET \
          --stdout=json \
          --json-output-file=wiz.json \
          --sarif-output-file=wiz.sarif

          if ! jq -e '.reportUrl? | type == "string" and length > 0' wiz.json > /dev/null; then
            echo "::error::Wiz scan completed but reportUrl is missing, upload to Wiz platform may have failed."
            exit 1
          fi

          IFS=$'\t' read -r report_url critical_count high_count medium_count low_count info_count policy_failed_count < <(
            jq -r '
              [
                (.reportUrl // ""),
                ([.result.discoveredPackages[]?.vulnerabilityFindings?.severities["criticalCount"] // 0] | add // 0),
                ([.result.discoveredPackages[]?.vulnerabilityFindings?.severities["highCount"] // 0] | add // 0),
                ([.result.discoveredPackages[]?.vulnerabilityFindings?.severities["mediumCount"] // 0] | add // 0),
                ([.result.discoveredPackages[]?.vulnerabilityFindings?.severities["lowCount"] // 0] | add // 0),
                ([.result.discoveredPackages[]?.vulnerabilityFindings?.severities["infoCount"] // 0] | add // 0),
                (.result.failedPolicyMatches | length // 0)
              ] | @tsv
            ' wiz.json
          )

          echo "Wiz report uploaded successfully: ${report_url}"

          render_wiz_table() {
            echo "| Severity | Count |"
            echo "|---|---:|"
            echo "| Critical | ${critical_count} |"
            echo "| High | ${high_count} |"
            echo "| Medium | ${medium_count} |"
            echo "| Low | ${low_count} |"
            echo "| Info | ${info_count} |"
            echo "| Failed policy matches | ${policy_failed_count} |"
            echo "| Report URL | ${report_url} |"
          }

          echo "===== WIZ CONTAINER SCAN SUMMARY ====="
          render_wiz_table

          {
            echo "### Wiz Container Scan Summary"
            echo ""
            render_wiz_table
            echo ""
            echo "[Open Wiz report](${report_url})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload sarif
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: wiz.sarif
