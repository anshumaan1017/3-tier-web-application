name: Wiz Container Scan + SARIF

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  wiz-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    env:
      TAG: 3-tier-web-application:${{ github.sha }}
      POLICY: "Default vulnerabilities policy"
      APPSEC_CONTACT: ${{ vars.APPSEC_CONTACT }}
      GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build . -t "$TAG"
          echo "Built image: $TAG"

      - name: Install wizcli
        run: |
          curl -L -o wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          chmod +x wizcli
          ./wizcli version || true

      - name: Run Wiz Container Scan
        id: wiz_scan
        continue-on-error: true
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          ./wizcli scan container-image "$TAG" \
            --policies "$POLICY" \
            --client-id  "$WIZ_CLIENT_ID" \
            --client-secret "$WIZ_CLIENT_SECRET" \
            --output wiz.json,json,true \
            --sarif-output-file wiz.sarif
          echo "Wiz scan exit code: $?"
          ls -lh wiz.json wiz.sarif 2>/dev/null || true

      - name: Parse Wiz output and build rich SARIF
        if: always()
        shell: pwsh
        run: |
          ./scripts/parse_wiz_scan.ps1 `
            -WizJsonPath         wiz.json `
            -WizStdoutPath       wiz-stdout.json `
            -WizSarifPath        wiz.sarif `
            -OutputSarifPath     wiz-github.sarif `
            -SummaryMarkdownPath wiz-summary.md `
            -GitHubRunUrl        "${{ env.GITHUB_RUN_URL }}" `
            -AppSecContact       "${{ env.APPSEC_CONTACT }}"

      - name: Publish summary to GitHub Job Summary
        if: always()
        run: |
          if [ -f wiz-summary.md ]; then
            cat wiz-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Wiz parsed outputs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wiz-parsed-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            wiz-summary.md
            wiz-github.sarif
            wiz.sarif
            wiz.json
            wiz-stdout.json

      - name: Verify SARIF output exists
        if: always()
        run: |
          if [ ! -f wiz-github.sarif ]; then
            echo "::error::wiz-github.sarif was not generated — check parser step above"
            exit 1
          fi
          echo "SARIF file size: $(wc -c < wiz-github.sarif) bytes"

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: wiz-github.sarif
          category: wiz-container-scan

      - name: Enforce Wiz policy gate
        if: always()
        run: |
          if [ "${{ steps.wiz_scan.outcome }}" = "failure" ]; then
            echo "::error::Wiz scan step itself failed (not a policy violation — check credentials/network)"
            exit 1
          fi
          echo "Wiz scan outcome: ${{ steps.wiz_scan.outcome }}"
          echo "Policy gate: allowing workflow to proceed (policy violations visible in Security tab)"
