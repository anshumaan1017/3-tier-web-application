name: "wiz-cli"

on: [pull_request,push]

jobs:
  wiz-cli-image-scan:
    runs-on: ubuntu-latest

    env:
      SCAN_PATH: "."
      TAG: "docker-tag"
      POLICY: "Default vulnerabilities policy"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: cd $SCAN_PATH && docker build . --tag $TAG

      - name: Download Wiz CLI
        run: curl -L -o wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64 && chmod +x wizcli

      # ✅ VERBOSE SCAN (human-readable + sarif)
      - name: Run Wiz scan (verbose + SARIF)
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          ./wizcli scan container-image $TAG \
          --policies "$POLICY" \
          --client-id $WIZ_CLIENT_ID \
          --client-secret $WIZ_CLIENT_SECRET \
          --stdout=human \
          --sarif-output-file=wiz.sarif \
          --log=wiz-debug.log

      # ✅ Upload SARIF to GitHub Security tab (Wiz doc aligned)
      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: wiz.sarif

      # ✅ FIXED DIGEST FORMAT
      - name: Get image digest
        id: digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $TAG || true)
          echo "DIGEST=$DIGEST" >> $GITHUB_ENV
          echo "Digest: $DIGEST"

      - name: Tag image (Graph enrichment)
        if: env.DIGEST != ''
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          ./wizcli tag $DIGEST \
          --client-id $WIZ_CLIENT_ID \
          --client-secret $WIZ_CLIENT_SECRET
