name: Wiz Container Scan + SARIF

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  wiz-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    env:
      TAG: 3-tier-web-application:${{ github.sha }}
      POLICY: "Default vulnerabilities policy"
      APPSEC_CONTACT: ${{ vars.APPSEC_CONTACT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Build image
        run: docker build . -t $TAG

      - name: Install wizcli
        run: |
          curl -L -o wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          chmod +x wizcli

      - name: Verify wizcli
        run: |
          ./wizcli --help > /dev/null
          ./wizcli scan container-image --help > /dev/null

      - name: Run Wiz Container Scan
        id: wiz_scan
        continue-on-error: true
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          ./wizcli scan container-image "$TAG" \
          --policies "$POLICY" \
          --client-id "$WIZ_CLIENT_ID" \
          --client-secret "$WIZ_CLIENT_SECRET" \
          --stdout=json \
          --json-output-file=wiz.json \
          --sarif-output-file=wiz.sarif \
          > wiz-stdout.json

      - name: Parse Wiz output and build rich SARIF
        if: always()
        shell: pwsh
        run: |
          ./scripts/parse_wiz_scan.ps1 -WizJsonPath wiz.json -WizStdoutPath wiz-stdout.json -OutputSarifPath wiz-github.sarif -SummaryMarkdownPath wiz-summary.md -AppSecContact "${{ env.APPSEC_CONTACT }}"

      - name: Verify SARIF output exists
        if: always()
        run: |
          if [ ! -f wiz-github.sarif ]; then
            echo "No SARIF file was generated; scan output cannot be uploaded to GitHub Security"
            exit 1
          fi

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wiz-scan-outputs
          path: |
            wiz.json
            wiz-stdout.json
            wiz.sarif
            wiz-github.sarif
            wiz-summary.md
          if-no-files-found: warn

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: wiz-github.sarif
          category: wiz-container-scan

      - name: Enforce Wiz policy gate
        if: always()
        run: |
          if [ "${{ steps.wiz_scan.outcome }}" != "success" ]; then
            echo "Wiz scan reported policy violations or execution failures"
            exit 1
          fi
