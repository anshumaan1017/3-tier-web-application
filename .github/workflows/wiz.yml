name: Wiz Container Scan + SARIF

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  wiz-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    env:
      TAG: 3-tier-web-application:${{ github.sha }}
      POLICY: "Default vulnerabilities policy"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install jq
        uses: dcarbone/install-jq-action@v3.2.0

      - name: Build image
        run: docker build . -t $TAG

      - name: Install wizcli
        run: |
          curl -L -o wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          chmod +x wizcli

      - name: Verify wizcli
        run: |
          ./wizcli --help > /dev/null
          ./wizcli scan container-image --help > /dev/null

      - name: Wiz help
        run: |
          ./wizcli --help
          ./wizcli scan container-image --help

      - name: Run Wiz Container Scan
        id: wiz_scan
        continue-on-error: true
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          ./wizcli scan container-image "$TAG" \
          --policies "$POLICY" \
          --client-id "$WIZ_CLIENT_ID" \
          --client-secret "$WIZ_CLIENT_SECRET" \
          --stdout=json \
          --json-output-file=wiz.json \
          --sarif-output-file=wiz.sarif

      - name: Print Wiz scan summary table
        if: always()
        run: |
          if [ ! -f wiz.json ]; then
            echo "wiz.json was not created by wizcli"
            exit 1
          fi

          echo "===== WIZ RAW COUNTS ====="
          jq -r '
            def pkgRows:
              [
                .. | objects
                | select((.type?.name? != null) and (.vulnerabilityFindings?.severities? != null))
              ];
            (pkgRows) as $rows
            | {
                packages: ($rows | length),
                critical: ($rows | map(.vulnerabilityFindings.severities.criticalCount // 0) | add // 0),
                high: ($rows | map(.vulnerabilityFindings.severities.highCount // 0) | add // 0),
                medium: ($rows | map(.vulnerabilityFindings.severities.mediumCount // 0) | add // 0),
                low: ($rows | map(.vulnerabilityFindings.severities.lowCount // 0) | add // 0)
              }
          ' wiz.json

          echo "===== WIZ SCAN SUMMARY ====="
          jq -r '
            def pkgRows:
              [
                .. | objects
                | select((.type?.name? != null) and (.vulnerabilityFindings?.severities? != null))
                | {
                    critical: (.vulnerabilityFindings.severities.criticalCount // 0),
                    high: (.vulnerabilityFindings.severities.highCount // 0),
                    medium: (.vulnerabilityFindings.severities.mediumCount // 0),
                    low: (.vulnerabilityFindings.severities.lowCount // 0)
                  }
              ];
            (pkgRows) as $rows
            | {
                critical: ($rows | map(.critical) | add // 0),
                high: ($rows | map(.high) | add // 0),
                medium: ($rows | map(.medium) | add // 0),
                low: ($rows | map(.low) | add // 0)
              } as $totals
            | ["VERDICT", "CRITICAL", "HIGH", "MEDIUM", "LOW"],
              [(.status.verdict // "UNKNOWN"), ($totals.critical|tostring), ($totals.high|tostring), ($totals.medium|tostring), ($totals.low|tostring)]
            | @tsv
          ' wiz.json | column -t -s $'\t'

          echo
          echo "===== TOP PACKAGES BY VULNERABILITY COUNT ====="
          jq -r '
            [
              .. | objects
              | select((.type?.name? != null) and (.vulnerabilityFindings?.severities? != null))
              | {
                  package: (.type.name // "unknown"),
                  version: (.type.version // "-"),
                  critical: (.vulnerabilityFindings.severities.criticalCount // 0),
                  high: (.vulnerabilityFindings.severities.highCount // 0),
                  medium: (.vulnerabilityFindings.severities.mediumCount // 0),
                  low: (.vulnerabilityFindings.severities.lowCount // 0),
                  total: ((.vulnerabilityFindings.severities.criticalCount // 0)
                        + (.vulnerabilityFindings.severities.highCount // 0)
                        + (.vulnerabilityFindings.severities.mediumCount // 0)
                        + (.vulnerabilityFindings.severities.lowCount // 0))
                }
              | select(.total > 0)
            ]
            | sort_by(.total) | reverse | .[:20]
            | (["PACKAGE", "VERSION", "CRITICAL", "HIGH", "MEDIUM", "LOW", "TOTAL"] | @tsv),
              (.[] | [.package, .version, (.critical|tostring), (.high|tostring), (.medium|tostring), (.low|tostring), (.total|tostring)] | @tsv)
          ' wiz.json | column -t -s $'\t'

      - name: Build GitHub-friendly SARIF from Wiz JSON
        if: always()
        run: |
          node <<'EOF'
          const fs = require("fs");

          if (!fs.existsSync("wiz.json")) {
            console.error("wiz.json is missing");
            process.exit(1);
          }

          const data = JSON.parse(fs.readFileSync("wiz.json", "utf8"));
          const rows = [];
          const visit = (node) => {
            if (!node || typeof node !== "object") return;
            if (
              node.type &&
              typeof node.type === "object" &&
              node.type.name &&
              node.vulnerabilityFindings &&
              node.vulnerabilityFindings.severities
            ) {
              rows.push(node);
            }
            if (Array.isArray(node)) {
              for (const item of node) visit(item);
            } else {
              for (const value of Object.values(node)) visit(value);
            }
          };
          visit(data);

          const normalize = (n) => Number.isFinite(Number(n)) ? Number(n) : 0;
          const countFor = (row, sev) => {
            const directKey = `${sev}Count`;
            const nested = row?.vulnerabilityFindings?.severities?.[directKey];
            const direct = row?.[directKey];
            return normalize(direct ?? nested ?? 0);
          };
          const results = [];

          for (const row of rows) {
            const pkg = row?.type?.name || "unknown-package";
            const ver = row?.type?.version || "unknown-version";
            const critical = countFor(row, "critical");
            const high = countFor(row, "high");
            const medium = countFor(row, "medium");
            const low = countFor(row, "low");
            const total = critical + high + medium + low;
            if (total === 0) continue;

            let level = "note";
            if (critical > 0 || high > 0) level = "error";
            else if (medium > 0) level = "warning";

            const fingerprint = `${pkg}@${ver}`;
            results.push({
              ruleId: "WIZ-OS-PACKAGE-VULNS",
              level,
              message: {
                text: `Package ${pkg}@${ver} has vulnerabilities (critical=${critical}, high=${high}, medium=${medium}, low=${low}).`
              },
              locations: [
                {
                  physicalLocation: {
                    artifactLocation: { uri: "Dockerfile" },
                    region: { startLine: 1 }
                  }
                }
              ],
              partialFingerprints: {
                packageFingerprint: fingerprint
              }
            });
          }

          const sarif = {
            version: "2.1.0",
            $schema: "https://json.schemastore.org/sarif-2.1.0.json",
            runs: [
              {
                tool: {
                  driver: {
                    name: "WizCLI",
                    informationUri: "https://www.wiz.io/",
                    rules: [
                      {
                        id: "WIZ-OS-PACKAGE-VULNS",
                        shortDescription: {
                          text: "Container OS package vulnerabilities detected by Wiz"
                        },
                        fullDescription: {
                          text: "Wiz container scan found package vulnerabilities and published a GitHub-compatible SARIF record."
                        },
                        defaultConfiguration: {
                          level: "warning"
                        }
                      }
                    ]
                  }
                },
                automationDetails: {
                  id: "wiz-container-scan"
                },
                results
              }
            ]
          };

          fs.writeFileSync("wiz-github.sarif", JSON.stringify(sarif, null, 2));
          console.log(`Generated wiz-github.sarif with ${results.length} result(s).`);
          EOF

      - name: Verify SARIF output exists
        if: always()
        run: |
          if [ ! -f wiz.sarif ] && [ ! -f wiz-github.sarif ]; then
            echo "No SARIF file was generated; scan output cannot be uploaded to GitHub Security"
            exit 1
          fi

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: wiz-github.sarif
          category: wiz-container-scan

      - name: Enforce Wiz policy gate
        if: always()
        run: |
          if [ "${{ steps.wiz_scan.outcome }}" != "success" ]; then
            echo "Wiz scan reported policy violations or execution failures"
            exit 1
          fi
