name: Wiz Container Scan + SARIF

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  wiz-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    env:
      TAG: 3-tier-web-application:${{ github.sha }}
      POLICY: "Default vulnerabilities policy"
      APPSEC_CONTACT: ${{ vars.APPSEC_CONTACT }}
      GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build . -t "$TAG"
          echo "Built image: $TAG"

      - name: Install wizcli
        run: |
          curl -L -o wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          chmod +x wizcli
          ./wizcli version || true

      - name: Run Wiz Container Scan
        id: wiz_scan
        continue-on-error: true
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          echo "::group::Wiz CLI scan details"
          echo "Image: $TAG"
          echo "Policy: $POLICY"
          echo "Run URL: $GITHUB_RUN_URL"
          ./wizcli scan container-image "$TAG" \
            --policies "$POLICY" \
            --client-id  "$WIZ_CLIENT_ID" \
            --client-secret "$WIZ_CLIENT_SECRET" \
            --json-output-file wiz.json \
            --sarif-output-file wiz.sarif
          WIZ_EXIT=$?
          echo "::endgroup::"
          echo "Wiz scan exit code: $WIZ_EXIT"
          echo "::group::Wiz output files"
          ls -lh wiz.json wiz.sarif 2>/dev/null || echo "No output files found"
          echo "wiz.json lines: $(wc -l < wiz.json 2>/dev/null || echo 0)"
          echo "::endgroup::"
          # Capture stdout scan summary for verbose logs
          if [ -f wiz.json ]; then
            python3 -c "
import json, sys
try:
    d = json.load(open('wiz.json'))
    v = d.get('status',{}).get('verdict','unknown')
    sid = d.get('id','unknown')
    res = d.get('result',{})
    arts = res.get('vulnerableSBOMArtifactsByNameVersion',[]) or []
    c=h=m=l=0
    for a in arts:
        vf = a.get('vulnerabilityFindings',{}) or {}
        s = vf.get('severities',{}) or {}
        c += s.get('criticalCount',0) or 0
        h += s.get('highCount',0) or 0
        m += s.get('mediumCount',0) or 0
        l += s.get('lowCount',0) or 0
    print(f'SCAN_ID={sid}')
    print(f'VERDICT={v}')
    print(f'PACKAGES={len(arts)}')
    print(f'C={c} H={h} M={m} L={l}')
except Exception as e:
    print(f'JSON parse error: {e}')
" || true
          fi

      - name: Parse Wiz output and build rich SARIF
        if: always()
        shell: pwsh
        run: |
          ./scripts/parse_wiz_scan.ps1 `
            -WizJsonPath         wiz.json `
            -WizStdoutPath       wiz-stdout.json `
            -WizSarifPath        wiz.sarif `
            -OutputSarifPath     wiz-github.sarif `
            -SummaryMarkdownPath wiz-summary.md `
            -GitHubRunUrl        "${{ env.GITHUB_RUN_URL }}" `
            -AppSecContact       "${{ env.APPSEC_CONTACT }}"

      - name: Publish summary to GitHub Job Summary
        if: always()
        run: |
          if [ -f wiz-summary.md ]; then
            cat wiz-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Wiz parsed outputs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wiz-parsed-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: warn
          path: |
            wiz-summary.md
            wiz-github.sarif
            wiz.sarif
            wiz.json
            wiz-stdout.json

      - name: Verify SARIF output exists
        if: always()
        run: |
          if [ ! -f wiz-github.sarif ]; then
            echo "::error::wiz-github.sarif was not generated — check parser step above"
            exit 1
          fi
          SARIF_SIZE=$(wc -c < wiz-github.sarif)
          SARIF_RESULTS=$(python3 -c "import json; s=json.load(open('wiz-github.sarif')); print(len(s['runs'][0]['results']))" 2>/dev/null || echo "parse-error")
          SARIF_RULES=$(python3 -c "import json; s=json.load(open('wiz-github.sarif')); print(len(s['runs'][0]['tool']['driver']['rules']))" 2>/dev/null || echo "parse-error")
          echo "::notice::SARIF file size: ${SARIF_SIZE} bytes | Rules: ${SARIF_RULES} | Results: ${SARIF_RESULTS}"
          echo "SARIF file size: ${SARIF_SIZE} bytes"
          echo "SARIF rules: ${SARIF_RULES}"
          echo "SARIF results: ${SARIF_RESULTS}"
          # Validate SARIF is valid JSON
          python3 -c "import json; json.load(open('wiz-github.sarif')); print('SARIF JSON valid')" || { echo "::error::SARIF is not valid JSON"; exit 1; }

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: wiz-github.sarif
          # Fixed category — same category on every run = GitHub OVERWRITES previous results
          # (existing alerts not in new upload are auto-closed by GitHub)
          category: wiz-container-scan
          wait-for-processing: true

      - name: Enforce Wiz policy gate
        if: always()
        run: |
          if [ "${{ steps.wiz_scan.outcome }}" = "failure" ]; then
            echo "::error::Wiz scan step itself failed (not a policy violation — check credentials/network)"
            exit 1
          fi
          echo "Wiz scan outcome: ${{ steps.wiz_scan.outcome }}"
          echo "Policy gate: allowing workflow to proceed (policy violations visible in Security tab)"
